name: Track TPE-NRT Flight Prices

on:
  schedule:
    - cron: '17 1 * * *'   # 每天 01:17 UTC = 台灣時間 09:17
                            # 選 17 分而非整點，是 GitHub 官方建議，避開整點
                            # 大量排程擁塞導致延遲執行
  workflow_dispatch:        # 允許手動點擊執行，方便先測試一次

permissions:
  contents: write            # 需要寫入權限才能把查價結果 commit 回 repo

jobs:
  track-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install --with-deps chromium

      - name: Query flight prices
        run: python track_flight_prices.py

      - name: Commit and push results
        run: |
          git config user.name "flight-price-bot"
          git config user.email "actions@github.com"
          git add data/price_history.csv
          git diff --cached --quiet || git commit -m "更新機票價格 $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
